# FishNet Radio modem configuration template.
# This file lists runtime knobs currently consumed by the modem.

sample_rate_hz: 96000
gnuradio_instance_address_tx: "127.0.0.1"
gnuradio_instance_port_tx: "20002"
gnuradio_instance_address_rx: "127.0.0.1"
gnuradio_instance_port_rx: "20001"

transmitter:
  ifft_size: 512
  idle_fill_samples: 16384
  valid_bins:
    low_block:
      start: 8
      end: 135
    high_block:
      start: 376
      end: 503
  preamble:
    bytes: ["F", "i", "S", "h", "N", "e", "T", ":"]

framing:
  mac:
    destination_mac: "FF:FF:FF:FF:FF:FF"
    source_mac: "00:11:22:33:44:55"

receiver:
  fft_size: 2048
  fft_overlap_samples: 384
  symbol_rows: 4
  preamble_rows: 32
  search_buffer_rows: 36
  discard_bins:
    - start: 541
      end: 1503
  nominal_rx_bins:
    low_block:
      start: 32
      end: 540
      step: 4
    high_block:
      start: 1504
      end: 2012
      step: 4
  cfar:
    non_detect_average_rows: 3200
    peak_to_average_ratio: 10
  tracking:
    energy_drop_threshold: 0.10
    drop_rows_required: 4
  debug_logging_level: "off"

payload:
  encoding: "utf-8"

output:
  deliver_payload: true
  include_source_mac: true
  validate_destination_mac: true
  allow_broadcast: true
